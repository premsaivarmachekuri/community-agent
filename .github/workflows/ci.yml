name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 💅 Lint
        run: pnpm dlx ultracite check

      - name: 🛠️ Build
        run: pnpm build
        env:
          BETTER_AUTH_SECRET: ci-placeholder
          SLACK_SIGNING_SECRET: ci-placeholder
          SLACK_BOT_TOKEN: xoxb-ci-placeholder
          REDIS_URL: redis://ci-placeholder:6379
